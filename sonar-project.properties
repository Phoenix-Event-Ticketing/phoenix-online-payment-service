sonar.organization=phoenix-event-ticketing
sonar.projectKey=Phoenix-Event-Ticketing_phoenix-online-payment-service

sonar.sourceEncoding=UTF-8
sonar.sources=src
sonar.tests=src/tests

sonar.exclusions=node_modules/**,coverage/**,**/*.test.js,**/*.spec.js
sonar.test.inclusions=src/tests/**/*.js

# Jest coverage (LCOV)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Wait for Quality Gate result in CI (SonarCloud)
#sonar.qualitygate.wait=true

# Optional: exclude generated or non-business paths from coverage noise
sonar.coverage.exclusions=**/src/tests/**,**/src/docs/**

