name: ci

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  build-test:
    name: Build, Audit, Lint, Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Audit dependencies (fail on high+)
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Test (coverage)
        run: npm run test:coverage

      - name: Upload coverage artifact
        if: ${{ hashFiles('coverage/lcov.info') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage
          if-no-files-found: error

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request' && (github.event.repository.private == false || vars.ENABLE_DEPENDENCY_REVIEW == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4

  sonar:
    name: SonarQube Cloud Analysis + Quality Gate
    needs: build-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=Phoenix-Event-Ticketing_phoenix-online-payment-service
            -Dsonar.organization=phoenix-event-ticketing
            -Dsonar.projectName=phoenix-online-payment-service
            -Dsonar.sources=src
            -Dsonar.tests=src/tests
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.exclusions=**/coverage/**,**/node_modules/**,**/docs/**,**/*.test.js,**/*.spec.js
            -Dsonar.test.inclusions=src/tests/**/*.js
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=300
            -Dsonar.coverage.exclusions=**/src/tests/**,**/src/docs/**

  trivy-fs:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy filesystem scan (SARIF)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          ignore-unfixed: true
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy filesystem SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  trivy-image:
    name: Trivy image scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        if: ${{ hashFiles('Dockerfile') != '' }}
        run: docker build -t phoenix-payment-service:ci .

      - name: Trivy image scan (SARIF)
        if: ${{ hashFiles('Dockerfile') != '' }}
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: phoenix-payment-service:ci
          format: sarif
          output: trivy-image.sarif
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Upload Trivy image SARIF
        if: ${{ hashFiles('Dockerfile') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

  osv-scanner:
    name: OSV dependency vulnerability scan
    needs: build-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install OSV Scanner
        env:
          OSV_VERSION: "2.3.3"
        run: |
          set -euo pipefail
          curl -sSfL -o /tmp/osv-scanner \
            "https://github.com/google/osv-scanner/releases/download/v${OSV_VERSION}/osv-scanner_linux_amd64"
          chmod +x /tmp/osv-scanner
          sudo mv /tmp/osv-scanner /usr/local/bin/osv-scanner
          osv-scanner --version

      - name: Run OSV Scanner and generate SARIF
        id: osv_scanner
        continue-on-error: true
        run: |
          set -euo pipefail
          osv-scanner scan -r . --format sarif --output osv.sarif

      - name: Upload OSV results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: osv.sarif
          category: osv-scanner

      - name: Fail if OSV Scanner found vulnerabilities
        if: steps.osv_scanner.outcome == 'failure'
        run: |
          echo "OSV Scanner reported vulnerabilities or failed. Check the step log and GitHub Security tab."
          exit 1